<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #83a4d4, #b6fbff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .weather-container {
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      text-align: center;
      width: 300px;
    }

    input {
      width: 80%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 15px;
    }

    button:hover {
      background-color: #0056b3;
    }

    .result {
      font-size: 18px;
      margin-top: 10px;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="weather-container">
  <h2>Weather App</h2>
  <input type="text" id="locationInput" placeholder="Enter city name" />
  <button onclick="getWeather()">Get Weather</button>
  <div id="weatherResult" class="result"></div>
  <div id="error" class="error"></div>
</div>

<script>
  async function getWeather() {
    const location = document.getElementById('locationInput').value;
    const resultDiv = document.getElementById('weatherResult');
    const errorDiv = document.getElementById('error');
    
    resultDiv.innerHTML = '';
    errorDiv.innerHTML = '';

    if (!location) {
      errorDiv.textContent = 'Please enter a city name.';
      return;
    }

    const apiKey = '0cacaed64cc74f3a93c65837251205';
    const apiUrl = `http://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${encodeURIComponent(location)}&aqi=yes`;

    try {
      const response = await fetch(apiUrl);
      if (!response.ok) throw new Error('City not found');
      const data = await response.json();

      const temp = data.current.temp_c;
      const condition = data.current.condition.text;
      const icon = data.current.condition.icon;

      resultDiv.innerHTML = `
        <p><strong>${data.location.name}, ${data.location.country}</strong></p>
        <img src="https:${icon}" alt="Weather icon">
        <p>Temperature: ${temp}°C</p>
        <p>Condition: ${condition}</p>
      `;
    } catch (error) {
      errorDiv.textContent = 'Could not fetch weather. Please try a valid city.';
    }
  }
</script>

</body>
</html>
